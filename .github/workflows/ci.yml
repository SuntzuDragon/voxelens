name: CI

on:
  # Run push-CI only on main (post-merge); PRs are validated via pull_request.
  # This avoids running the whole suite twice for the same commit on a PR branch.
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all

  # Guards WebAssembly-compatibility: builds the wasm bindings crate (which
  # pulls in core) for wasm32, so a non-wasm dependency is caught immediately.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build wasm bindings for wasm32
        run: cargo build -p voxelens-wasm --target wasm32-unknown-unknown

  # Security advisories (RUSTSEC) for our dependency tree.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  # Test coverage summary (printed to the run summary; no external service).
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage
        run: cargo llvm-cov --all --summary-only | tee -a "$GITHUB_STEP_SUMMARY"

  # Build the browser app (wasm-pack + Vite) so it can't silently rot.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@wasm-pack
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build web app
        working-directory: web
        run: npm ci && npm run build
